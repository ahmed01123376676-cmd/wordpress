name: Deploy to Kubernetes

on:
  push:
    branches:
      - main      # أو master حسب الـ branch بتاعك
    paths:
      - 'manifests/**'
  workflow_dispatch:  # للتشغيل اليدوي

env:
  KUBE_NAMESPACE: wordpress-ns

jobs:
  deploy:
    name: Deploy WordPress to K8s
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout الكود
    - name: Checkout code
      uses: actions/checkout@v4
    
    # 2. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    # 3. Configure kubeconfig
    - name: Configure Kubernetes
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    # 4. Test connection
    - name: Test K8s Connection
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    # 5. Deploy manifests بالترتيب
    - name: Deploy Namespace
      run: kubectl apply -f manifests/01-namespace.yaml
    
    - name: Deploy Secrets
      run: kubectl apply -f manifests/02-secrets.yaml
    
    - name: Deploy ConfigMap
      run: kubectl apply -f manifests/03-configmap.yaml
    
    - name: Deploy MySQL PVC
      run: kubectl apply -f manifests/04-mysql-pvc.yaml
    
    - name: Wait for PVC to be bound
      run: |
        kubectl wait --for=jsonpath='{.status.phase}'=Bound pvc/mysql-pvc -n $KUBE_NAMESPACE --timeout=60s || true
    
    - name: Deploy MySQL
      run: |
        kubectl apply -f manifests/05-mysql-deployment.yaml
        kubectl apply -f manifests/06-mysql-service.yaml
    
    - name: Wait for MySQL to be ready
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/mysql-deployment -n $KUBE_NAMESPACE
    
    - name: Deploy WordPress
      run: |
        kubectl apply -f manifests/07-wordpress-deployment.yaml
        kubectl apply -f manifests/08-wordpress-service.yaml
    
    - name: Wait for WordPress to be ready
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment/wordpress-deployment -n $KUBE_NAMESPACE
    
    - name: Deploy TLS Secret
      run: kubectl apply -f manifests/10-tls-secret.yaml
    
    - name: Deploy Ingress
      run: kubectl apply -f manifests/09-ingress.yaml
    
    # 6. Verify deployment
    - name: Verify Deployment
      run: |
        echo "=== Pods Status ==="
        kubectl get pods -n $KUBE_NAMESPACE
        
        echo "=== Services ==="
        kubectl get svc -n $KUBE_NAMESPACE
        
        echo "=== Ingress ==="
        kubectl get ingress -n $KUBE_NAMESPACE
    
    # 7. Deploy Backup (اختياري)
    - name: Deploy Backup Resources
      run: |
        if [ -d "manifests/backup" ]; then
          kubectl apply -f manifests/backup/
        fi
      continue-on-error: true
    
    # 8. Success notification (اختياري)
    - name: Send Telegram Notification
      if: success()
      run: |
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="✅ WordPress deployed successfully to K8s!
        📦 Commit: ${{ github.sha }}
        👤 By: ${{ github.actor }}
        🌿 Branch: ${{ github.ref_name }}"
      continue-on-error: true